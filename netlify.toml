# ═══════════════════════════════════════════════════
#  Best Hilton Head Properties — Netlify Configuration
#  besthiltonheadproperties.com
# ═══════════════════════════════════════════════════

[build]
  publish = "."

# ── Force HTTPS & strip www ──
[[redirects]]
  from   = "http://besthiltonheadproperties.com/*"
  to     = "https://besthiltonheadproperties.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.besthiltonheadproperties.com/*"
  to     = "https://besthiltonheadproperties.com/:splat"
  status = 301
  force  = true

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    X-XSS-Protection             = "1; mode=block"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://besthiltonheadproperties.com https://*.besthiltonheadproperties.com; media-src 'self'; frame-ancestors 'none';"

# ── Cache videos for 1 year (immutable) ──
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Always revalidate HTML so updates go live instantly ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
