# ═══════════════════════════════════════════════
# Best Hilton Head Properties — Netlify Configuration
# besthiltonheadproperties.com
# ═══════════════════════════════════════════════

[build]
  publish = "."

# ── Force HTTPS & strip www ──
[[redirects]]
  from = "http://besthiltonheadproperties.com/*"
  to = "https://besthiltonheadproperties.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.besthiltonheadproperties.com/*"
  to = "https://besthiltonheadproperties.com/:splat"
  status = 301
  force = true

# ── Security Headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://besthiltonheadproperties.com https://*.besthiltonheadproperties.com https://www.seapines.com https://images.unsplash.com; media-src 'self'; frame-src https://www.youtube.com https://youtube.com https://www.google.com https://maps.google.com https://maps.googleapis.com; frame-ancestors 'none';"

# ── Cache videos for 1 year (immutable) ──
[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache JS patches for 1 hour (allow quick updates) ──
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ── Always revalidate HTML so updates go live instantly ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Script Injection: all pages ─────────────────────────────────────────────
# Load order: content-patch first (fixes text), then widgets, then footer last


# 0. Hero anti-flicker — hides hero text at load; content-patch.js reveals it
[[snippets]]
  location = "head"
  html = "<style>.hero-headline em,[class*='hero'] h1 em,[class*='hero'] h2 em,.hero em,#hero em,.hero-sub{visibility:hidden}</style>"

# 1. Global content patch — Lowcountry → Carolina Sea Islands rebrand
[[snippets]]
  location = "body"
  html = "<script src='/content-patch.js' defer></script>"

# 2. Editorial Widget — Your Bluffton Home Search article carousel
[[snippets]]
  location = "body"
  html = "<script src='/editorial-widget.js' defer></script>"

